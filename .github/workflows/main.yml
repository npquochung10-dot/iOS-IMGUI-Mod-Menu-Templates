name: Build NetPing Dylib
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Theos
        run: |
          # Cài đặt Theos vào thư mục người dùng trên máy ảo
          git clone --recursive https://github.com/theos/theos.git ~/theos
          echo "THEOS=$HOME/theos" >> $GITHUB_ENV

      - name: Build Dylib
        run: |
          # Sử dụng đường dẫn vừa thiết lập để chạy lệnh make
          export THEOS=$HOME/theos
          make FINALPACKAGE=1 ARCHS="arm64 arm64e"
        
      - name: Upload Result
        uses: actions/upload-artifact@v4
        with:
          name: NetPing-Dylib
          path: .theos/obj/*.dylib
