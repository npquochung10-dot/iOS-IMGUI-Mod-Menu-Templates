name: Build NetPing Dylib
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-13  # Dùng bản macOS ổn định hơn
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Theos
        run: |
          git clone --recursive https://github.com/theos/theos.git ~/theos
          # Lấy SDK có sẵn trong Xcode của máy ảo GitHub
          ln -s /Applications/Xcode.app/Contents/Developer/Platforms/iPhoneOS.platform/Developer/SDKs/iPhoneOS.sdk ~/theos/sdks/iPhoneOS.sdk
          echo "THEOS=$HOME/theos" >> $GITHUB_ENV

      - name: Build Dylib
        run: |
          export THEOS=$HOME/theos
          # Tạo file giả nếu thiếu để không báo lỗi file not found
          touch x2nios.h
          make clean
          make FINALPACKAGE=1
        
      - name: Upload Result
        uses: actions/upload-artifact@v4
        with:
          name: NetPing-Dylib
          path: .theos/obj/*.dylib
