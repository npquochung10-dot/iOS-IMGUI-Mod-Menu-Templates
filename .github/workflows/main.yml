name: Build NetPing Dylib
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Theos
        run: |
          bash -c "$(curl -fsSL https://raw.githubusercontent.com/theos/theos/master/bin/install-theos)"
          echo "THEOS=/Users/runner/theos" >> $GITHUB_ENV

      - name: Build Dylib
        run: |
          export THEOS=/Users/runner/theos
          # Lệnh này giúp bỏ qua kiểm tra SDK nghiêm ngặt để dễ build hơn
          make FINALPACKAGE=1 ALWAYS_CLEAN=1 ARCHS="arm64 arm64e"
        
      - name: Upload Result
        uses: actions/upload-artifact@v4
        with:
          name: NetPing-Sane-Dylib
          # Tìm tất cả file .dylib phát sinh trong thư mục build
          path: .theos/obj/**/*.dylib
